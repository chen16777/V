<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    width: 420px;
    padding: 40px;
    background: #1a1a2e;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: bold; color: white;
    margin: 0 auto 20px;
  }
  h1 { text-align: center; font-size: 22px; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
  .status-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px;
    background: #16213e; margin-bottom: 10px; font-size: 14px;
  }
  .status-item .icon { font-size: 18px; width: 24px; text-align: center; }
  .status-item .label { color: #888; min-width: 60px; }
  .status-item .value { color: #ccc; }
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .time-display {
    text-align: center; margin-top: 24px;
    font-size: 13px; color: #666;
  }
  .time-display span { color: #667eea; font-weight: 600; }
  .music-bar {
    display: flex; gap: 3px; align-items: flex-end;
    height: 16px; justify-content: center; margin-top: 12px;
  }
  .music-bar div {
    width: 4px; background: #667eea; border-radius: 2px;
    animation: bounce 1s infinite;
  }
  .music-bar div:nth-child(1) { animation-delay: 0s; height: 8px; }
  .music-bar div:nth-child(2) { animation-delay: 0.1s; height: 14px; }
  .music-bar div:nth-child(3) { animation-delay: 0.2s; height: 10px; }
  .music-bar div:nth-child(4) { animation-delay: 0.3s; height: 16px; }
  .music-bar div:nth-child(5) { animation-delay: 0.4s; height: 12px; }
  @keyframes bounce {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.4); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="avatar">M</div>
  <h1>My Status Page</h1>
  <p class="subtitle">个人状态 · 随时可改</p>

  <div class="status-item">
    <span class="icon"><span class="online-dot"></span></span>
    <span class="label">在线</span>
    <span class="value">随时可联系</span>
  </div>
  <div class="status-item">
    <span class="icon">&#128187;</span>
    <span class="label">地点</span>
    <span class="value">Home Office</span>
  </div>
  <div class="status-item">
    <span class="icon">&#128218;</span>
    <span class="label">正在</span>
    <span class="value">探索数据分析</span>
  </div>
  <div class="status-item">
    <span class="icon">&#127912;</span>
    <span class="label">音乐</span>
    <span class="value">Lo-Fi Beats</span>
  </div>
  <div class="music-bar">
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="time-display">
    当前时间 <span id="clock"></span>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const t = now.toLocaleTimeString('zh-CN', { hour12: false });
    const d = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    document.getElementById('clock').textContent = d + ' ' + t;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
