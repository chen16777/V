<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    width: 400px;
    max-width: 100%;
  }
  .profile {
    text-align: center;
    margin-bottom: 32px;
  }
  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: bold; color: white;
    margin: 0 auto 16px;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  }
  .profile h1 { font-size: 20px; margin-bottom: 4px; }
  .profile p { color: #888; font-size: 13px; }
  .link-card {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    background: #1a1a2e;
    border-radius: 12px;
    margin-bottom: 12px;
    text-decoration: none;
    color: #e0e0e0;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid transparent;
  }
  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(102,126,234,0.2);
    border-color: #667eea;
  }
  .link-card .icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .link-card .text { flex: 1; }
  .link-card .text .name { font-size: 14px; font-weight: 600; }
  .link-card .text .desc { font-size: 12px; color: #888; margin-top: 2px; }
  .link-card .arrow { color: #555; font-size: 16px; }

  /* 各平台配色 */
  .bg-github { background: #24292e; }
  .bg-bilibili { background: #fb7299; }
  .bg-weixin { background: #07c160; }
  .bg-zhihu { background: #0066ff; }
  .bg-twitter { background: #1da1f2; }
  .bg-email { background: #ea4335; }
  .bg-blog { background: #ff9800; }
  .bg-project { background: #4caf50; }

  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #444;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 个人资料区 -->
  <div class="profile">
    <div class="avatar">M</div>
    <h1>Your Name</h1>
    <p>数据爱好者 · 终身学习者</p>
  </div>

  <!-- 链接列表 -->
  <a class="link-card" href="https://github.com/yourname" target="_blank">
    <div class="icon bg-github">&#9729;</div>
    <div class="text">
      <div class="name">GitHub</div>
      <div class="desc">开源项目 & 代码库</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="https://space.bilibili.com/yourid" target="_blank">
    <div class="icon bg-bilibili">&#9877;</div>
    <div class="text">
      <div class="name">Bilibili</div>
      <div class="desc">视频教程 & 学习笔记</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="https://www.zhihu.com/people/yourid" target="_blank">
    <div class="icon bg-zhihu">&#9752;</div>
    <div class="text">
      <div class="name">知乎</div>
      <div class="desc">技术文章 & 观点分享</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="https://twitter.com/yourid" target="_blank">
    <div class="icon bg-twitter">&#128172;</div>
    <div class="text">
      <div class="name">Twitter / X</div>
      <div class="desc">日常想法 & 行业动态</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="mailto:you@email.com">
    <div class="icon bg-email">&#9993;</div>
    <div class="text">
      <div class="name">Email</div>
      <div class="desc">正式合作 & 商务联系</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="https://yourblog.com" target="_blank">
    <div class="icon bg-blog">&#128221;</div>
    <div class="text">
      <div class="name">个人博客</div>
      <div class="desc">深度技术文章</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <a class="link-card" href="https://yourproject.com" target="_blank">
    <div class="icon bg-project">&#128640;</div>
    <div class="text">
      <div class="name">我的项目</div>
      <div class="desc">产品 & 工具推荐</div>
    </div>
    <span class="arrow">&rarr;</span>
  </a>

  <div class="footer">Built with &#10084; · Cloudflare Pages</div>
</div>
</body>
</html>
